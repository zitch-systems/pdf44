# Codemagic CI/CD for the PDF44 Android app (mobile/).
#
# Connect: in Codemagic, add this repository (project type: React Native). This
# file lives at the repo root, where Codemagic auto-detects it. Trigger the
# `android-apk` workflow to produce installable APKs, or `android-emulator-test`
# to boot an emulator and run the Maestro UI smoke flow.
#
# Signing: the debug APK always builds with the bundled debug keystore. For a
# release-signed APK, add the environment group `pdf44_release` with:
#   PDF44_KEYSTORE_BASE64        base64 of your upload keystore (.jks)
#   PDF44_RELEASE_STORE_PASSWORD keystore password
#   PDF44_RELEASE_KEY_ALIAS      key alias
#   PDF44_RELEASE_KEY_PASSWORD   key password
# Without that group, the release build falls back to debug signing so it still
# completes (handled in android/app/build.gradle).

workflows:
  android-apk:
    name: PDF44 Android APK
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      node: 20
      java: 17
      groups:
        - pdf44_release # optional; see header. Safe to omit for debug-only builds.
      vars:
        PACKAGE_NAME: "com.pdf44"
    cache:
      cache_paths:
        - $HOME/.gradle/caches
        - mobile/node_modules
    scripts:
      - name: Install JS dependencies
        script: |
          cd mobile
          npm ci
      - name: Typecheck & unit tests
        script: |
          cd mobile
          npm run tsc
          npm test -- --ci
      - name: Decode release keystore (optional)
        script: |
          cd mobile
          if [ -n "$PDF44_KEYSTORE_BASE64" ]; then
            echo "$PDF44_KEYSTORE_BASE64" | base64 --decode > "$CM_BUILD_DIR/mobile/android/app/pdf44-release.jks"
            echo "PDF44_RELEASE_STORE_FILE=$CM_BUILD_DIR/mobile/android/app/pdf44-release.jks" >> "$CM_ENV"
            echo "Release keystore decoded."
          else
            echo "No release keystore provided — release build will use debug signing."
          fi
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/mobile/android/local.properties"
      - name: Build debug APK
        script: |
          cd mobile/android
          ./gradlew assembleDebug --no-daemon
      - name: Build release APK
        script: |
          cd mobile/android
          ./gradlew assembleRelease --no-daemon
    artifacts:
      - mobile/android/app/build/outputs/**/*.apk
      - mobile/android/app/build/outputs/**/mapping.txt
    publishing:
      email:
        recipients:
          - teyokensax1@gmail.com
        notify:
          success: true
          failure: true

  # Boots an Android emulator, installs the debug APK, and runs the Maestro UI
  # smoke flow — producing screenshots + video so the app is verified actually
  # running (not just built). Artifacts land under mobile/.maestro and Maestro's
  # debug output.
  android-emulator-test:
    name: PDF44 Emulator UI Test (Maestro)
    instance_type: mac_mini_m2
    max_build_duration: 90
    environment:
      node: 20
      java: 17
      vars:
        PACKAGE_NAME: "com.pdf44"
    cache:
      cache_paths:
        - $HOME/.gradle/caches
        - mobile/node_modules
    scripts:
      - name: Install JS dependencies
        script: |
          cd mobile
          npm ci
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/mobile/android/local.properties"
      - name: Build debug APK
        script: |
          cd mobile/android
          ./gradlew assembleDebug --no-daemon
      - name: Install Maestro
        script: |
          export MAESTRO_VERSION=1.39.0
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "PATH=$PATH:$HOME/.maestro/bin" >> "$CM_ENV"
      - name: Create & boot emulator
        script: |
          set -e
          SDK="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin"
          # Mac mini instances are Apple Silicon → use arm64-v8a system images
          # (x86_64 emulator images cannot boot on ARM hosts).
          IMAGE="system-images;android-34;google_apis;arm64-v8a"
          yes | "$SDK/sdkmanager" --licenses >/dev/null 2>&1 || true
          "$SDK/sdkmanager" --install "$IMAGE" "emulator" "platform-tools" >/dev/null
          echo "no" | "$SDK/avdmanager" create avd --force --name pdf44 \
            --package "$IMAGE" --device "pixel_6"
          "$ANDROID_SDK_ROOT/emulator/emulator" -avd pdf44 -no-window -no-audio \
            -no-boot-anim -gpu swiftshader_indirect -no-snapshot &
          adb wait-for-device
          # Block until the system finishes booting (up to ~5 min).
          for i in $(seq 1 100); do
            [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" = "1" ] && break
            sleep 3
          done
          adb shell input keyevent 82 || true
          adb shell settings put global window_animation_scale 0 || true
          adb shell settings put global transition_animation_scale 0 || true
          adb shell settings put global animator_duration_scale 0 || true
      - name: Install APK on emulator
        script: |
          adb install -r mobile/android/app/build/outputs/apk/debug/app-debug.apk
      - name: Run Maestro smoke flow
        script: |
          cd mobile/.maestro
          maestro test smoke.yaml --format junit --output "$CM_BUILD_DIR/maestro-report.xml"
    artifacts:
      - mobile/.maestro/*.png
      - maestro-report.xml
      - $HOME/.maestro/tests/**/*.png
      - $HOME/.maestro/tests/**/*.mp4
    publishing:
      email:
        recipients:
          - teyokensax1@gmail.com
        notify:
          success: true
          failure: true
