<style>
/* ============================================================
   THEME TOKENS — Dark (default) & Light
   ============================================================ */
:root, [data-theme="dark"] {
  --bg:            #0a0a0f;
  --bg-2:          #12121a;
  --bg-3:          #1a1a2e;
  --bg-elev:       #1e1e2e;
  --bg-glass:      rgba(255,255,255,0.04);
  --bg-glass-hover: rgba(255,255,255,0.07);
  --text:          #ffffff;
  --text-2:        #b8b8c8;
  --text-3:        #7a7a90;
  --accent:        #6366f1;
  --accent-2:      #8b5cf6;
  --accent-3:      #a855f7;
  --accent-glow:   rgba(99,102,241,0.18);
  --accent-glow-2: rgba(139,92,246,0.18);
  --success:       #22c55e;
  --warning:       #f59e0b;
  --error:         #ef4444;
  --border:        rgba(255,255,255,0.07);
  --border-strong: rgba(255,255,255,0.12);
  --shadow-sm:     0 2px 8px rgba(0,0,0,0.3);
  --shadow:        0 8px 32px rgba(0,0,0,0.4);
  --shadow-lg:     0 20px 60px rgba(0,0,0,0.5);
  --shadow-glow:   0 0 40px var(--accent-glow);
  --canvas-bg:     #ffffff;
  --code-bg:       #0d0d18;
}

[data-theme="light"] {
  --bg:            #f7f8fc;
  --bg-2:          #ffffff;
  --bg-3:          #eef0f7;
  --bg-elev:       #ffffff;
  --bg-glass:      rgba(0,0,0,0.025);
  --bg-glass-hover: rgba(0,0,0,0.05);
  --text:          #0f1729;
  --text-2:        #475569;
  --text-3:        #94a3b8;
  --accent:        #6366f1;
  --accent-2:      #8b5cf6;
  --accent-3:      #a855f7;
  --accent-glow:   rgba(99,102,241,0.12);
  --accent-glow-2: rgba(139,92,246,0.12);
  --success:       #16a34a;
  --warning:       #d97706;
  --error:         #dc2626;
  --border:        rgba(15,23,41,0.08);
  --border-strong: rgba(15,23,41,0.15);
  --shadow-sm:     0 1px 3px rgba(15,23,41,0.06);
  --shadow:        0 4px 16px rgba(15,23,41,0.08);
  --shadow-lg:     0 12px 40px rgba(15,23,41,0.12);
  --shadow-glow:   0 0 32px rgba(99,102,241,0.18);
  --canvas-bg:     #ffffff;
  --code-bg:       #f1f5f9;
}

:root {
  --sidebar-w:   272px;
  --topbar-h:    64px;
  --radius:      16px;
  --radius-sm:   10px;
  --radius-xs:   6px;
  --radius-lg:   24px;
  --ease:        cubic-bezier(0.4, 0, 0.2, 1);
  --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
  --max-w:       1440px;
}

/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { font-size: 16px; scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "cv11", "ss01";
  transition: background 0.25s var(--ease), color 0.25s var(--ease);
}
img, svg, canvas { display: block; max-width: 100%; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea, select { font-family: inherit; color: inherit; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 5px; border: 2px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

/* ============================================================
   LAYOUT — App shell
   ============================================================ */
.app { display: flex; min-height: 100vh; min-height: 100dvh; }

.sidebar {
  width: var(--sidebar-w);
  background: var(--bg-2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  inset: 0 auto 0 0;
  z-index: 100;
  transition: transform 0.3s var(--ease);
  overflow-y: auto;
  overflow-x: hidden;
}
.sidebar-header {
  padding: 20px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg-2);
  z-index: 10;
}
.logo-icon {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 17px; color: white;
  flex-shrink: 0;
  box-shadow: 0 4px 16px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.2);
}
.logo-text { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; line-height: 1; }
.logo-text span { background: linear-gradient(135deg, var(--accent), var(--accent-2)); -webkit-background-clip: text; background-clip: text; color: transparent; }

.sidebar-nav { padding: 14px 10px; flex: 1; }
.nav-section { margin-bottom: 14px; }
.nav-label {
  padding: 8px 14px 6px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-3);
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 9px 13px;
  margin: 1px 4px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.18s var(--ease);
  font-size: 13.5px;
  font-weight: 500;
  color: var(--text-2);
  border: 1px solid transparent;
  user-select: none;
  white-space: nowrap;
}
.nav-item:hover { background: var(--bg-glass); color: var(--text); }
.nav-item.active {
  background: var(--accent-glow);
  color: var(--accent);
  border-color: rgba(99,102,241,0.25);
  font-weight: 600;
}
.nav-icon { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.nav-badge {
  margin-left: auto;
  font-size: 9px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 4px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: white;
  letter-spacing: 0.05em;
}

.sidebar-footer {
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 6px;
  font-size: 11px;
  color: var(--text-3);
}
.sidebar-footer-links { display: flex; flex-wrap: wrap; gap: 4px 12px; }
.sidebar-footer-links a { color: var(--text-3); font-size: 11px; }
.sidebar-footer-links a:hover { color: var(--accent); text-decoration: none; }
.sidebar-footer-note { display: flex; align-items: center; gap: 6px; }
.privacy-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); box-shadow: 0 0 8px var(--success); }

.main {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  width: calc(100% - var(--sidebar-w));
  min-width: 0;
}

/* ============================================================
   TOPBAR
   ============================================================ */
.topbar {
  height: var(--topbar-h);
  background: color-mix(in srgb, var(--bg) 80%, transparent);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  position: sticky;
  top: 0;
  z-index: 90;
  gap: 16px;
}
.topbar-left { min-width: 0; flex: 1; }
.page-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.page-desc { font-size: 12.5px; color: var(--text-3); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.topbar-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

.theme-toggle {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: var(--bg-glass);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-2);
  transition: all 0.2s var(--ease);
  position: relative;
  overflow: hidden;
}
.theme-toggle:hover { color: var(--accent); border-color: var(--accent); transform: translateY(-1px); }
.theme-toggle svg { width: 18px; height: 18px; transition: transform 0.4s var(--ease-bounce); }
.theme-toggle .sun { display: none; }
.theme-toggle .moon { display: block; }
[data-theme="light"] .theme-toggle .sun { display: block; }
[data-theme="light"] .theme-toggle .moon { display: none; }

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  font-size: 13.5px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.18s var(--ease);
  white-space: nowrap;
  touch-action: manipulation;
  user-select: none;
  letter-spacing: -0.1px;
}
.btn:disabled { opacity: 0.45; cursor: not-allowed; }
.btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: white; box-shadow: 0 4px 14px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.18); }
.btn-primary:not(:disabled):hover { transform: translateY(-1px); box-shadow: 0 8px 24px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.2); }
.btn-secondary { background: var(--bg-glass); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--bg-glass-hover); border-color: var(--border-strong); }
.btn-success { background: var(--success); color: white; }
.btn-ghost { background: transparent; color: var(--text-2); }
.btn-ghost:hover { background: var(--bg-glass); color: var(--text); }
.btn-danger { background: var(--error); color: white; }
.btn-sm { padding: 7px 14px; font-size: 12.5px; }
.btn-lg { padding: 14px 28px; font-size: 15px; }
.btn-block { width: 100%; }

/* Mobile menu */
.mobile-toggle {
  display: none;
  width: 38px; height: 38px;
  align-items: center; justify-content: center;
  border-radius: 10px;
  background: var(--bg-glass);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 18px;
  flex-shrink: 0;
}
.sidebar-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(4px);
  z-index: 99;
  opacity: 0;
  transition: opacity 0.3s var(--ease);
}
.sidebar-overlay.active { display: block; opacity: 1; }

/* ============================================================
   CONTENT
   ============================================================ */
.content {
  padding: 28px;
  flex: 1;
  max-width: var(--max-w);
  width: 100%;
  margin: 0 auto;
}

/* HERO */
.hero {
  margin-bottom: 36px;
  text-align: center;
  padding: 20px 0 8px;
}
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  background: var(--accent-glow);
  border: 1px solid rgba(99,102,241,0.25);
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 18px;
  letter-spacing: 0.02em;
}
.hero-badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--success); box-shadow: 0 0 8px var(--success); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.hero h1 {
  font-size: clamp(28px, 5vw, 48px);
  font-weight: 800;
  letter-spacing: -1.5px;
  line-height: 1.1;
  margin-bottom: 14px;
}
.hero h1 span {
  background: linear-gradient(135deg, var(--accent), var(--accent-2), var(--accent-3));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.hero p {
  color: var(--text-2);
  font-size: clamp(14px, 1.8vw, 17px);
  max-width: 620px;
  margin: 0 auto;
  line-height: 1.6;
}
.hero-stats {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin-top: 24px;
  flex-wrap: wrap;
}
.hero-stat { text-align: center; }
.hero-stat-num { font-size: 22px; font-weight: 800; color: var(--text); }
.hero-stat-label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }

/* CATEGORY HEADING */
.cat-block { margin-bottom: 36px; }
.cat-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.cat-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* TOOLS GRID */
.tools-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 14px;
}
.tool-card {
  position: relative;
  padding: 22px 18px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.25s var(--ease);
  overflow: hidden;
  text-align: left;
}
.tool-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--accent-glow) 0%, transparent 50%);
  opacity: 0;
  transition: opacity 0.3s var(--ease);
  pointer-events: none;
}
.tool-card:hover {
  transform: translateY(-3px);
  border-color: var(--accent);
  box-shadow: var(--shadow), 0 0 0 1px var(--accent-glow);
}
.tool-card:hover::before { opacity: 1; }
.tool-card-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  margin-bottom: 14px;
  background: var(--bg-3);
  position: relative;
  z-index: 1;
  transition: transform 0.3s var(--ease-bounce);
}
.tool-card:hover .tool-card-icon { transform: scale(1.1) rotate(-4deg); }
.tool-card-title { font-size: 14.5px; font-weight: 700; margin-bottom: 4px; position: relative; z-index: 1; letter-spacing: -0.2px; }
.tool-card-desc { font-size: 12px; color: var(--text-3); line-height: 1.4; position: relative; z-index: 1; }
.tool-card-pro {
  position: absolute;
  top: 12px; right: 12px;
  font-size: 9px;
  font-weight: 700;
  padding: 3px 7px;
  border-radius: 4px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: white;
  letter-spacing: 0.05em;
}

/* Tool icon color variants */
.ti-red    { background: linear-gradient(135deg, #ef4444, #f87171); color: white; }
.ti-orange { background: linear-gradient(135deg, #f97316, #fb923c); color: white; }
.ti-yellow { background: linear-gradient(135deg, #eab308, #facc15); color: white; }
.ti-green  { background: linear-gradient(135deg, #22c55e, #4ade80); color: white; }
.ti-teal   { background: linear-gradient(135deg, #14b8a6, #2dd4bf); color: white; }
.ti-cyan   { background: linear-gradient(135deg, #06b6d4, #22d3ee); color: white; }
.ti-blue   { background: linear-gradient(135deg, #3b82f6, #60a5fa); color: white; }
.ti-indigo { background: linear-gradient(135deg, #6366f1, #818cf8); color: white; }
.ti-purple { background: linear-gradient(135deg, #8b5cf6, #a78bfa); color: white; }
.ti-pink   { background: linear-gradient(135deg, #ec4899, #f472b6); color: white; }
.ti-rose   { background: linear-gradient(135deg, #f43f5e, #fb7185); color: white; }
.ti-slate  { background: linear-gradient(135deg, #64748b, #94a3b8); color: white; }

/* ============================================================
   UPLOAD ZONE
   ============================================================ */
.upload-zone {
  border: 2px dashed var(--border-strong);
  border-radius: var(--radius-lg);
  padding: 56px 28px;
  text-align: center;
  cursor: pointer;
  transition: all 0.25s var(--ease);
  background: var(--bg-glass);
  position: relative;
  overflow: hidden;
}
.upload-zone::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 0%, var(--accent-glow), transparent 70%);
  opacity: 0;
  transition: opacity 0.3s var(--ease);
}
.upload-zone:hover, .upload-zone.dragover {
  border-color: var(--accent);
  background: var(--accent-glow);
  transform: scale(1.005);
}
.upload-zone:hover::before, .upload-zone.dragover::before { opacity: 1; }
.upload-zone.dragover { border-style: solid; }
.upload-icon {
  width: 64px; height: 64px;
  margin: 0 auto 16px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  color: white;
  font-size: 28px;
  box-shadow: 0 8px 24px var(--accent-glow);
  position: relative;
  z-index: 1;
}
.upload-text { font-size: 17px; font-weight: 700; margin-bottom: 6px; position: relative; z-index: 1; }
.upload-subtext { font-size: 13px; color: var(--text-3); position: relative; z-index: 1; }
.upload-formats { margin-top: 14px; font-size: 11px; color: var(--text-3); position: relative; z-index: 1; }

/* ============================================================
   FILE LIST
   ============================================================ */
.file-list { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }
.file-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  transition: all 0.2s var(--ease);
}
.file-card:hover { border-color: var(--border-strong); }
.file-card.dragging { opacity: 0.5; }
.file-thumb {
  width: 44px; height: 44px;
  border-radius: 10px;
  background: var(--accent-glow);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.file-info { flex: 1; min-width: 0; }
.file-name { font-size: 13.5px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-meta { font-size: 11.5px; color: var(--text-3); margin-top: 2px; }
.file-actions { display: flex; gap: 4px; flex-shrink: 0; }
.file-remove {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--bg-glass);
  color: var(--text-2);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  transition: all 0.2s var(--ease);
}
.file-remove:hover { background: var(--error); color: white; }

/* ============================================================
   SETTINGS PANEL
   ============================================================ */
.settings-panel {
  margin-top: 20px;
  padding: 22px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.settings-title {
  font-size: 14px;

function icon(name, opts) {

  const stroke = opts.stroke != null ? opts.stroke : 2;

// Centralized pdf.js loader — caches the proxy on the file object, applies
// consistent options, and never re-parses the buffer twice.
async function loadPdfJs(file, password) {
  if (file.pdfjsDoc) return file.pdfjsDoc;
  const copy = file.arrayBuffer.slice(0);
  const opts = {
    data: copy,
    disableFontFace: false,
    verbosity: 0,
    isEvalSupported: false
  };
  if (password) opts.password = password;
  try {
    file.pdfjsDoc = await pdfjsLib.getDocument(opts).promise;
    return file.pdfjsDoc;
  } catch (e) {
    // pdf.js throws a PasswordException with .code = 1 (NEED_PASSWORD) or 2 (INCORRECT)
    if (e && (e.name === 'PasswordException' || (e.code && (e.code === 1 || e.code === 2)))) {
      file.isEncrypted = true;
    }
    throw e;
  }
}

let _themePref = 'dark';
function safeGetTheme() {
  try {
    const saved = localStorage.getItem('pdf44-theme');
    if (saved === 'light' || saved === 'dark') return saved;
  } catch(e) {}
  // System preference
  try {
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) return 'light';
  } catch(e) {}
  return 'dark';
}
function safeSetTheme(t) {
  try { localStorage.setItem('pdf44-theme', t); } catch(e) {}
}
function applyTheme(theme) {
  _themePref = theme;
  document.body.setAttribute('data-theme', theme);
  // Update theme-color meta dynamically
  const themeColorMeta = document.querySelector('meta[name="theme-color"]:not([media])');
  if (themeColorMeta) themeColorMeta.setAttribute('content', theme === 'light' ? '#ffffff' : '#0a0a0f');
  safeSetTheme(theme);
}

  applyTheme(_themePref === 'dark' ? 'light' : 'dark');

// ============================================================
//  ROUTER
// ============================================================
function route(tool) {
  state.currentTool = tool;
  state.files = [];
  state.pageOrder = [];
  state.pageRotations = {};
  state.watermarkImage = null;

  renderSidebar();
  const meta = SPECIAL_PAGES[tool] || TOOLS[tool];
  if (meta) {
    document.getElementById('pageTitle').textContent = meta.title;
    document.getElementById('pageDesc').textContent = meta.desc;
  }
  const processBtn = document.getElementById('processBtn');
  const clearBtn = document.getElementById('clearBtn');
  if (meta && meta.hideProcess) {
    processBtn.style.display = 'none';
    clearBtn.style.display = 'none';
  } else {
    processBtn.style.display = '';
    clearBtn.style.display = '';
    processBtn.disabled = true;
  }

  if (window.innerWidth < 901) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('active');
  }

  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('active');
}

}

async function triggerInstall(platform) {
  if (state.deferredInstallPrompt) {
    try {
      state.deferredInstallPrompt.prompt();
      const { outcome } = await state.deferredInstallPrompt.userChoice;
      state.deferredInstallPrompt = null;
      state.installable = false;
      if (outcome === 'accepted') toast('PDF44 installed!', 'success');
    } catch (e) { console.error(e); }
    return;
  }
  // Fallback instructions
  if (platform === 'android') {
    openModal('Install on Android', `
      <ol style="line-height:1.9;font-size:13.5px;color:var(--text-2);padding-left:18px;">
        <li>Open this site in <b>Chrome</b>.</li>

  }
}

  if (!tool) return renderHome(container);

  const acceptText = tool.accepts === '.pdf' ? 'PDF files' :
                     tool.accepts === 'image/*' ? 'Images (JPG, PNG, WebP)' :
                     tool.accepts ? tool.accepts.toUpperCase() : 'Any input';
  const multiText = tool.multi ? (tool.maxFiles ? `Up to ${tool.maxFiles} files` : 'Multiple files') : 'Single file';

  let html = '';

  // Show upload zone unless tool needs no file input
  if (tool.accepts !== '') {
    html += `
      <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">${icon('upload', {size:32, stroke:2.2})}</div>
        <div class="upload-text">Drop ${acceptText.toLowerCase()} here</div>
        <div class="upload-subtext">or click to browse</div>
        <div class="upload-formats">${acceptText} · ${multiText} · Max 200&nbsp;MB</div>
        <input type="file" id="fileInput" style="display:none;" ${tool.multi?'multiple':''} accept="${tool.accepts}" onchange="handleFiles(this.files)">
      </div>
      <div class="file-list" id="fileList"></div>
    `;
  }

  // Settings (tool-specific)
  html += `<div class="settings-panel" id="settingsPanel" style="display:${tool.accepts===''?'block':'none'};">`;
  html += `<div class="settings-title"><span class="title-icon">${icon('gear', {size:16})}</span> Options</div>`;
  html += getToolSettingsHTML(state.currentTool);
  html += `</div>`;

  // Preview area
  html += `<div class="preview-area" id="previewArea" style="display:none;">
    <div class="preview-title"><span class="title-icon">${icon('eye', {size:16})}</span> Preview</div>
    <div class="preview-canvas-container" id="previewContainer"></div>
  </div>`;

  // Progress
  html += `<div class="progress-container" id="progressArea" style="display:none;">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">Processing...</div>
  </div>`;

  // Results
  html += `<div class="results-area" id="resultsArea"></div>`;

  // Ad
  html += `<div class="ad-slot ad-rectangle">📢 Rectangle ad — Replace with your Monetag code</div>`;

  container.innerHTML = html;
  setupDragDrop();
  setupToolListeners();
  if (tool.accepts === '') updateProcessButton();
}

// ============================================================
//  DRAG & DROP / FILE HANDLING
// ============================================================
function setupDragDrop() {
  const zone = document.getElementById('dropZone');
  if (!zone) return;
  ['dragenter','dragover','dragleave','drop'].forEach(evt => {
    zone.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); });
  });
  ['dragenter','dragover'].forEach(evt => zone.addEventListener(evt, () => zone.classList.add('dragover')));
  ['dragleave','drop'].forEach(evt => zone.addEventListener(evt, () => zone.classList.remove('dragover')));
  zone.addEventListener('drop', e => handleFiles(e.dataTransfer.files));
}

async function handleFiles(fileList) {
  const tool = TOOLS[state.currentTool];
  if (!tool) return;
  const files = Array.from(fileList);
  if (!files.length) return;

  if (!tool.multi && files.length > 1) { toast('Only one file allowed for this tool','error'); return; }
  if (tool.maxFiles && (state.files.length + files.length) > tool.maxFiles) {
    toast(`Maximum ${tool.maxFiles} files allowed`,'error'); return;
  }

  for (const file of files) {
    if (file.size > 200 * 1024 * 1024) { toast(`${file.name} exceeds 200 MB limit`,'error'); continue; }
    const id = Math.random().toString(36).slice(2);
    const item = { id, file, name: file.name, size: file.size, type: file.type };
    const isPdf = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');
    if (isPdf) {
      try {
        item.arrayBuffer = await file.arrayBuffer();
        item.pdfDoc = await PDFLib.PDFDocument.load(item.arrayBuffer, { ignoreEncryption: true });
        item.pageCount = item.pdfDoc.getPageCount();
      } catch(e) {
        console.error(e);
        toast(`Could not load ${file.name}: ${e.message}`,'error');
        continue;
      }
    }
    state.files.push(item);
  }

  renderFileList();
  updateProcessButton();

  if (state.files.some(f => f.pdfDoc)) {
    const sp = document.getElementById('settingsPanel');
    if (sp) sp.style.display = 'block';
    await renderPreviews();
  }
  if ((state.currentTool === 'organize' || state.currentTool === 'remove') && state.files[0]?.pdfDoc) {
    setTimeout(() => renderPageGrid(), 100);
  }
  if (state.currentTool === 'info' && state.files[0]?.pdfDoc) {
    loadMetadata(state.files[0]);
  }
}

function renderFileList() {
  const list = document.getElementById('fileList');
  if (!list) return;
  if (!state.files.length) { list.innerHTML = ''; return; }
  list.innerHTML = state.files.map((f, i) => `
    <div class="file-card" ${state.currentTool==='merge'?'draggable="true"':''} data-index="${i}">
      <div class="file-thumb">${f.pdfDoc?icon('text2pdf',{size:22,stroke:1.8}):icon('pdf2jpg',{size:22,stroke:1.8})}</div>
      <div class="file-info">
        <div class="file-name">${escapeHtml(f.name)}</div>
        <div class="file-meta">${formatBytes(f.size)}${f.pageCount?' · '+f.pageCount+' pages':''}</div>
      </div>
      <div class="file-actions">
        ${state.currentTool==='merge'?`<button class="file-remove" onclick="moveFile(${i},-1)" title="Move up">↑</button><button class="file-remove" onclick="moveFile(${i},1)" title="Move down">↓</button>`:''}
        <button class="file-remove" onclick="removeFile('${f.id}')" title="Remove">×</button>
      </div>
    </div>
  `).join('');

  if (state.currentTool === 'merge') {
    let dragSrc = null;
    list.querySelectorAll('.file-card').forEach(card => {
      card.addEventListener('dragstart', () => { dragSrc = +card.dataset.index; card.classList.add('dragging'); });
      card.addEventListener('dragend',   () => card.classList.remove('dragging'));
      card.addEventListener('dragover',  e => e.preventDefault());
      card.addEventListener('drop', e => {
        e.preventDefault();
        const dst = +card.dataset.index;
        if (dragSrc === null || dragSrc === dst) return;
        const item = state.files.splice(dragSrc, 1)[0];
        state.files.splice(dst, 0, item);
        renderFileList();
      });
    });
  }
}

function moveFile(idx, dir) {
  const j = idx + dir;
  if (j < 0 || j >= state.files.length) return;
  [state.files[idx], state.files[j]] = [state.files[j], state.files[idx]];
  renderFileList();
}
function removeFile(id) {
  state.files = state.files.filter(f => f.id !== id);
  renderFileList();
  updateProcessButton();
  if (!state.files.length) {
    document.getElementById('previewArea').style.display = 'none';
    const sp = document.getElementById('settingsPanel');
    if (sp && TOOLS[state.currentTool].accepts !== '') sp.style.display = 'none';
    document.getElementById('resultsArea').innerHTML = '';
    const grid = document.getElementById('pageGridContainer');
    if (grid) grid.remove();
  }
}
function clearAll() {
  state.files = [];
  state.pageOrder = [];
  state.pageRotations = {};
  renderFileList();
  updateProcessButton();
  const prev = document.getElementById('previewArea');
  if (prev) prev.style.display = 'none';
  const sp = document.getElementById('settingsPanel');
  if (sp && TOOLS[state.currentTool]?.accepts !== '') sp.style.display = 'none';
  const res = document.getElementById('resultsArea');
  if (res) res.innerHTML = '';
  const grid = document.getElementById('pageGridContainer');
  if (grid) grid.remove();
}
function updateProcessButton() {
  const btn = document.getElementById('processBtn');
  if (!btn) return;
  let ok = state.files.length > 0;
  if (state.currentTool === 'compare' && state.files.length !== 2) ok = false;
  if (state.currentTool === 'html2pdf') ok = !!document.getElementById('htmlContent')?.value?.trim();
  if (state.currentTool === 'text2pdf') ok = !!document.getElementById('textContent')?.value?.trim();
  btn.disabled = !ok;
}
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function formatBytes(b) {
  if (!b) return '0 B';
  const k = 1024, sizes = ['B','KB','MB','GB'];
  const i = Math.floor(Math.log(b) / Math.log(k));
  return parseFloat((b / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
}


// ============================================================
//  PREVIEW RENDERING (THE BIG FIX)
//  We use pdf.js for ALL rendering (pdf-lib can't render visually).
//  We re-load the original bytes through pdf.js instead of re-saving,
//  which avoids "TT: undefined function" warnings and is much faster.
// ============================================================
// ============================================================
//  PREVIEW RENDERING (fixed)
//  - Renders each thumbnail at the actual displayed pixel width × DPR
//    so it is crisp (4K-ready) but never oversized.
//  - Drops the CSS width:100% override by writing explicit pixel sizes
//    after measurement.
//  - Uses pdf.js for ALL rendering, sharing one PDFDocumentProxy per file.
// ============================================================
async function renderPreviews() {
  const container = document.getElementById('previewContainer');
  const area = document.getElementById('previewArea');
  if (!container || !area) return;
  area.style.display = 'block';
  container.innerHTML = '<div class="spinner"></div>';

  const pdfFile = state.files.find(f => f.pdfDoc);
  if (!pdfFile) {
    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><div class="empty-state-text">No PDF to preview</div></div>';
    return;
  }

  try {
    // Cache pdf.js doc on the file via the helper (consistent options, quiet logs)
    await loadPdfJs(pdfFile);
    const total = pdfFile.pdfjsDoc.numPages;
    const toRender = Math.min(total, 6);

    // Build the grid first so we can measure cell width
    let html = '';
    for (let i = 1; i <= toRender; i++) {
      html += `<div class="preview-canvas-item">
        <div class="preview-canvas-frame"><canvas id="prevCanvas${i}"></canvas></div>
        <div class="page-label">Page ${i}${total > toRender && i === toRender ? ` of ${total}` : ''}</div>
      </div>`;
    }
    container.innerHTML = html;

    // Measure available width per cell, then render in parallel for speed.
    // Wait one frame so the grid actually has layout (clientWidth > 0).
    await new Promise(res => requestAnimationFrame(res));
    const frames = container.querySelectorAll('.preview-canvas-frame');
    const tasks = [];
    for (let i = 1; i <= toRender; i++) {
      const frame = frames[i - 1];
      const targetW = frame ? frame.clientWidth : 200;
      tasks.push(renderPdfJsPageToWidth(pdfFile.pdfjsDoc, i, document.getElementById(`prevCanvas${i}`), targetW));
    }
    await Promise.all(tasks);
  } catch (e) {
    console.error('Preview error:', e);
    if (pdfFile.isEncrypted || (e && e.name === 'PasswordException')) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🔒</div><div class="empty-state-text">This PDF is password-protected. Use <a href="#" onclick="route('unlock');return false;" style="color:var(--accent);">Unlock PDF</a> first.</div></div>`;
    } else {
      container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">Could not render preview. The file may be corrupted or use unsupported features.</div></div>`;
    }
  }
}

// Render a page so the resulting canvas is exactly `targetCssWidth` pixels wide
// in CSS, with backing store at × devicePixelRatio for crispness.
async function renderPdfJsPageToWidth(pdfjsDoc, pageNum, canvas, targetCssWidth) {
  if (!canvas || !targetCssWidth || targetCssWidth < 20) return;
  const page = await pdfjsDoc.getPage(pageNum);
  const viewport1 = page.getViewport({ scale: 1 });
  const scaleToFit = targetCssWidth / viewport1.width;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const viewport = page.getViewport({ scale: scaleToFit * dpr });

  canvas.width = Math.floor(viewport.width);
  canvas.height = Math.floor(viewport.height);
  canvas.style.width = Math.floor(viewport.width / dpr) + 'px';
  canvas.style.height = Math.floor(viewport.height / dpr) + 'px';

  const ctx = canvas.getContext('2d', { alpha: false });
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  try {
    await page.render({ canvasContext: ctx, viewport, intent: 'display' }).promise;
  } catch (e) {
    // Render error — show a friendly placeholder, don't crash the whole preview
    ctx.fillStyle = '#999';
    ctx.font = '14px sans-serif';
    ctx.fillText('Page ' + pageNum, 12, 24);
  }
}

// Backwards-compat wrapper — old code called renderPdfJsPage(doc, n, canvas, scale).
// scale here is treated as a multiplier on the natural page width at 100 px CSS,
// matching the previous behavior for non-grid contexts (organize, reader, exports).
async function renderPdfJsPage(pdfjsDoc, pageNum, canvas, scale = 1) {
  if (!canvas) return;
  const page = await pdfjsDoc.getPage(pageNum);
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const viewport = page.getViewport({ scale: scale * dpr });
  canvas.width = Math.floor(viewport.width);
  canvas.height = Math.floor(viewport.height);
  canvas.style.width = Math.floor(viewport.width / dpr) + 'px';
  canvas.style.height = Math.floor(viewport.height / dpr) + 'px';
  const ctx = canvas.getContext('2d', { alpha: false });
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  try {
    await page.render({ canvasContext: ctx, viewport, intent: 'display' }).promise;
  } catch (e) {
    ctx.fillStyle = '#999';
    ctx.font = '14px sans-serif';
    ctx.fillText('Page ' + pageNum, 12, 24);
  }
}

// ============================================================
//  PAGE GRID (organize / remove)
// ============================================================
async function renderPageGrid() {
  const f = state.files[0];
  if (!f?.pdfDoc) return;
  const existing = document.getElementById('pageGridContainer');
  if (existing) existing.remove();

  const pageCount = f.pdfDoc.getPageCount();
  state.pageOrder = f.pdfDoc.getPageIndices();

  const panel = document.createElement('div');
  panel.className = 'settings-panel';
  panel.id = 'pageGridContainer';
  panel.innerHTML = `
    <div class="settings-title"><span class="title-icon">${icon('organize', {size:16})}</span> Pages — drag to reorder, hover to remove</div>
    <div class="page-grid" id="pageGrid"></div>
    <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn btn-secondary btn-sm" onclick="resetPages()"><span class="btn-icon-inline"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7l3 3"/><path d="M21 3v6h-6"/><path d="M21 12a9 9 0 0 1-15 6.7l-3-3"/><path d="M3 21v-6h6"/></svg></span> Reset</button>
      <button class="btn btn-secondary btn-sm" onclick="selectAllPages()"><span class="btn-icon-inline"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 5 5L20 7"/></svg></span> Select all</button>
    </div>`;
  document.getElementById('content').appendChild(panel);

  // Ensure pdf.js doc loaded
  await loadPdfJs(f);

  const grid = panel.querySelector('#pageGrid');
  for (let i = 0; i < pageCount; i++) {
    const item = document.createElement('div');
    item.className = 'page-item';
    item.draggable = true;
    item.dataset.page = i;
    item.innerHTML = `
      <div class="page-thumb-frame"><canvas id="orgPage${i}"></canvas></div>
      <div class="page-num">Page ${i+1}</div>
      <button class="page-delete" onclick="event.stopPropagation();removePage(${i})" title="Remove">×</button>`;
    grid.appendChild(item);
  }
  // Render in a second pass so all cells are sized before measuring
  requestAnimationFrame(() => {
    grid.querySelectorAll('.page-thumb-frame').forEach((frame, idx) => {
      const cw = frame.clientWidth || 130;
      renderPdfJsPageToWidth(f.pdfjsDoc, idx + 1, document.getElementById(`orgPage${idx}`), cw).catch(() => {});
    });
  });

  let dragSrc = null;
  grid.querySelectorAll('.page-item').forEach(item => {
    item.addEventListener('dragstart', () => { dragSrc = +item.dataset.page; item.classList.add('dragging'); });
    item.addEventListener('dragend', () => item.classList.remove('dragging'));
    item.addEventListener('dragover', e => e.preventDefault());
    item.addEventListener('drop', e => {
      e.preventDefault();
      const dst = +item.dataset.page;
      if (dragSrc === null || dragSrc === dst) return;
      const si = state.pageOrder.indexOf(dragSrc);
      const di = state.pageOrder.indexOf(dst);
      if (si < 0 || di < 0) return;
      const [moved] = state.pageOrder.splice(si, 1);
      state.pageOrder.splice(di, 0, moved);
      reorderGridDom();
    });
  });
}
function reorderGridDom() {
  const grid = document.getElementById('pageGrid');
  if (!grid) return;
  const items = {};
  grid.querySelectorAll('.page-item').forEach(el => items[+el.dataset.page] = el);
  state.pageOrder.forEach(p => grid.appendChild(items[p]));
}
function removePage(idx) {
  state.pageOrder = state.pageOrder.filter(p => p !== idx);
  const el = document.querySelector(`.page-item[data-page="${idx}"]`);
  if (el) el.remove();
}
function resetPages() {
  const f = state.files[0];
  if (f?.pdfDoc) state.pageOrder = f.pdfDoc.getPageIndices();
  renderPageGrid();
}
function selectAllPages() {
  const f = state.files[0];
  if (f?.pdfDoc) state.pageOrder = f.pdfDoc.getPageIndices();
  reorderGridDom();
  document.querySelectorAll('.page-item').forEach(el => el.style.display = '');
}

async function processMerge() {
  if (state.files.length < 2) { toast('Add at least 2 PDFs','error'); return; }
  const merged = await PDFLib.PDFDocument.create();
  const total = state.files.length;
  for (let i = 0; i < total; i++) {
    const f = state.files[i];
    if (!f.pdfDoc) continue;
    const copied = await merged.copyPages(f.pdfDoc, f.pdfDoc.getPageIndices());
    copied.forEach(p => merged.addPage(p));
    showProgress((i+1)/total*100, `Merging ${i+1} of ${total}…`);
  }
  const bytes = await merged.save();
  downloadAndShow(bytes, 'merged.pdf');
  toast('PDFs merged successfully', 'success');
}

async function processSplit() {
  const f = state.files[0];
  if (!f.pdfDoc) return;
  const mode = document.getElementById('splitMode').value;
  const pc = f.pdfDoc.getPageCount();
  let ranges = [];
  if (mode === 'single') for (let i = 0; i < pc; i++) ranges.push([i, i]);
  else if (mode === 'every') {
    const n = parseInt(document.getElementById('splitEvery').value) || 1;
    for (let i = 0; i < pc; i += n) ranges.push([i, Math.min(i+n-1, pc-1)]);
  } else {
    const input = document.getElementById('splitRanges').value.trim();
    if (!input) { for (let i = 0; i < pc; i++) ranges.push([i, i]); }
    else input.split(',').forEach(p => {
      p = p.trim();
      if (p.includes('-')) { const [a,b] = p.split('-').map(x=>parseInt(x)-1); if (!isNaN(a)&&!isNaN(b)) ranges.push([a,b]); }
      else { const idx = parseInt(p)-1; if (!isNaN(idx)) ranges.push([idx,idx]); }
    });
  }
  if (!ranges.length) { toast('No valid ranges','error'); return; }

  if (ranges.length === 1) {
    const [s, e] = ranges[0];
    const doc = await PDFLib.PDFDocument.create();
    const idx = []; for (let p = s; p <= e; p++) idx.push(p);
    const copied = await doc.copyPages(f.pdfDoc, idx);
    copied.forEach(p => doc.addPage(p));
    const bytes = await doc.save();
    downloadAndShow(bytes, `pages_${s+1}-${e+1}.pdf`);
  } else {
    const zip = new JSZip();
    const folder = zip.folder('split-pdf');
    for (let i = 0; i < ranges.length; i++) {
      const [s, e] = ranges[i];
      if (s < 0 || e >= pc || s > e) continue;
      const doc = await PDFLib.PDFDocument.create();
      const idx = []; for (let p = s; p <= e; p++) idx.push(p);
      const copied = await doc.copyPages(f.pdfDoc, idx);
      copied.forEach(p => doc.addPage(p));
      folder.file(`pages_${s+1}-${e+1}.pdf`, await doc.save());
      showProgress((i+1)/ranges.length*100, `Splitting ${i+1} of ${ranges.length}…`);
    }
    const blob = await zip.generateAsync({ type: 'blob' });
    saveAs(blob, 'split-pdf.zip');
    showResult('split-pdf.zip', blob.size, 'ZIP');
  }
  toast('Split complete','success');
}

async function processOrganize() {
  const f = state.files[0];
  if (!f.pdfDoc) return;
  const order = state.pageOrder.length ? state.pageOrder : f.pdfDoc.getPageIndices();
  if (!order.length) { toast('No pages selected','error'); return; }
  const doc = await PDFLib.PDFDocument.create();
  const copied = await doc.copyPages(f.pdfDoc, order);
  copied.forEach(p => doc.addPage(p));
  const bytes = await doc.save();
  downloadAndShow(bytes, 'organized.pdf');
  toast('Pages reorganized','success');
}

async function processRotate() {
  const angle = parseInt(document.getElementById('rotateAngle').value);
  const all = document.getElementById('rotateAll').checked;
  const txt = document.getElementById('rotatePages').value;
  for (let n = 0; n < state.files.length; n++) {
    const f = state.files[n];
    if (!f.pdfDoc) continue;
    const pc = f.pdfDoc.getPageCount();
    let pages = all ? f.pdfDoc.getPageIndices() : parsePagesInput(txt, pc);
    pages.forEach(i => {
      const p = f.pdfDoc.getPage(i);
      const cur = p.getRotation().angle;
      p.setRotation(PDFLib.degrees((cur + angle) % 360));
    });
    const bytes = await f.pdfDoc.save();
    downloadAndShow(bytes, `rotated_${f.name}`);
    showProgress((n+1)/state.files.length*100, `Rotating ${n+1} of ${state.files.length}…`);
  }
  toast('Rotation applied','success');
}

async function processRemove() {
  const f = state.files[0];
  if (!f.pdfDoc) return;
  const pc = f.pdfDoc.getPageCount();
  let kept;
  // Prefer the visual grid selection if it's been used
  if (state.pageOrder.length && state.pageOrder.length < pc) {
    kept = state.pageOrder;
  } else {
    const txt = document.getElementById('removePages')?.value || '';
    const toRemove = new Set(parsePagesInput(txt, pc));
    kept = f.pdfDoc.getPageIndices().filter(i => !toRemove.has(i));
  }
  if (!kept.length) { toast('Nothing left after removal','error'); return; }
  const doc = await PDFLib.PDFDocument.create();
  const copied = await doc.copyPages(f.pdfDoc, kept);
  copied.forEach(p => doc.addPage(p));
  const bytes = await doc.save();
  downloadAndShow(bytes, 'pages-removed.pdf');
  toast(`Removed ${pc - kept.length} page(s)`,'success');
}

async function processExtract() {
  const f = state.files[0];
  if (!f.pdfDoc) return;
  const pc = f.pdfDoc.getPageCount();
  const txt = document.getElementById('extractPages').value;
  const pages = parsePagesInput(txt, pc);
  if (!pages.length) { toast('No valid pages specified','error'); return; }
  const doc = await PDFLib.PDFDocument.create();
  const copied = await doc.copyPages(f.pdfDoc, pages);
  copied.forEach(p => doc.addPage(p));
  const bytes = await doc.save();
  downloadAndShow(bytes, 'extracted.pdf');
  toast(`Extracted ${pages.length} page(s)`,'success');
}

async function processCompress() {
  const level = document.querySelector('input[name="compressLevel"]:checked')?.value || 'high';
  for (let n = 0; n < state.files.length; n++) {
    const f = state.files[n];
    if (!f.pdfDoc) continue;
    try {
      f.pdfDoc.setTitle('');
      f.pdfDoc.setAuthor('');
      f.pdfDoc.setSubject('');
      f.pdfDoc.setKeywords([]);
      f.pdfDoc.setProducer('PDF44');
      f.pdfDoc.setCreator('PDF44');
    } catch(e){}
    const bytes = await f.pdfDoc.save({
      useObjectStreams: true,
      addDefaultPage: false,
      objectsPerTick: level === 'high' ? 50 : level === 'medium' ? 100 : 200
    });
    const saved = f.size - bytes.length;
    downloadAndShow(bytes, `compressed_${f.name}`);
    if (saved > 0) toast(`Saved ${formatBytes(saved)} on ${f.name}`,'success');
    showProgress((n+1)/state.files.length*100, `Compressing ${n+1} of ${state.files.length}…`);
  }
}

async function processRepair() {
  const f = state.files[0];
  if (!f) return;
  try {
    const doc = await PDFLib.PDFDocument.load(f.arrayBuffer, { ignoreEncryption: true, updateMetadata: false, throwOnInvalidObject: false });
    const bytes = await doc.save();
    downloadAndShow(bytes, `repaired_${f.name}`);
    toast('PDF rebuilt — try opening it now', 'success');
  } catch (e) { toast('Could not repair: ' + e.message, 'error'); }
}

async function processPdf2Image(format) {
  const f = state.files[0];
  if (!f.pdfDoc) return;
  const dpi = parseInt(document.getElementById('imageDpi').value) || 300;
  const scale = dpi / 72;
  const allPages = document.getElementById('imgAllPages').checked;
  if (!f.pdfjsDoc) {
    const copy = f.arrayBuffer.slice(0);
    f.pdfjsDoc = await pdfjsLib.getDocument({ data: copy }).promise;
  }
  const total = f.pdfjsDoc.numPages;
  const count = allPages ? total : 1;

  if (count === 1) {
    const canvas = document.createElement('canvas');
    await renderPdfJsPage(f.pdfjsDoc, 1, canvas, scale);
    const mime = format === 'png' ? 'image/png' : 'image/jpeg';
    const ext = format === 'png' ? 'png' : 'jpg';
    canvas.toBlob(blob => {
      saveAs(blob, `page_1.${ext}`);
      showResult(`page_1.${ext}`, blob.size, ext.toUpperCase());
      toast('Conversion complete','success');
    }, mime, format === 'png' ? undefined : 0.92);
    return;
  }
  const zip = new JSZip();
  const folder = zip.folder('pdf-images');
  for (let i = 1; i <= count; i++) {
    const canvas = document.createElement('canvas');
    await renderPdfJsPage(f.pdfjsDoc, i, canvas, scale);
    const mime = format === 'png' ? 'image/png' : 'image/jpeg';
    const ext = format === 'png' ? 'png' : 'jpg';
    const blob = await new Promise(res => canvas.toBlob(res, mime, format === 'png' ? undefined : 0.92));
    folder.file(`page_${i}.${ext}`, blob);
    showProgress(i/count*100, `Rendering page ${i} of ${count}…`);
  }
  const zipBlob = await zip.generateAsync({ type: 'blob' });
  saveAs(zipBlob, 'pdf-images.zip');
  showResult('pdf-images.zip', zipBlob.size, 'ZIP');
  toast('Conversion complete','success');
}

async function processJpg2Pdf() {
  const { jsPDF } = window.jspdf;
  const sizeSel = document.getElementById('img2pdfSize').value;
  const orientSel = document.getElementById('img2pdfOrient').value;
  const margin = document.getElementById('img2pdfMargin').checked ? 10 : 0;

  let doc;
  for (let i = 0; i < state.files.length; i++) {
    const f = state.files[i];
    const dataUrl = await fileToDataUrl(f.file);
    const img = await loadImage(dataUrl);
    let w = img.width, h = img.height;
    const finalOrient = orientSel === 'auto' ? (w > h ? 'l' : 'p') : (orientSel === 'landscape' ? 'l' : 'p');
    const format = sizeSel === 'A4' ? 'a4' : sizeSel === 'letter' ? 'letter' : sizeSel === 'legal' ? 'legal' : [w*25.4/96, h*25.4/96];
    if (!doc) doc = new jsPDF({ orientation: finalOrient, unit: 'mm', format });
    else doc.addPage(format, finalOrient);
    const fmt = (f.type||'').includes('png') ? 'PNG' : 'JPEG';
    if (sizeSel === 'fit') {
      doc.addImage(dataUrl, fmt, 0, 0, doc.internal.pageSize.getWidth(), doc.internal.pageSize.getHeight());
    } else {
      const pw = doc.internal.pageSize.getWidth() - margin*2;
      const ph = doc.internal.pageSize.getHeight() - margin*2;
      const ratio = Math.min(pw/w, ph/h);
      const nw = w*ratio, nh = h*ratio;
      const x = (doc.internal.pageSize.getWidth() - nw)/2;
      const y = (doc.internal.pageSize.getHeight() - nh)/2;
      doc.addImage(dataUrl, fmt, x, y, nw, nh);
    }
    showProgress((i+1)/state.files.length*100, `Adding image ${i+1}…`);
  }
  const blob = doc.output('blob');
  saveAs(blob, 'images-to-pdf.pdf');
  showResult('images-to-pdf.pdf', blob.size, 'PDF');
  toast('Images combined','success');
}

async function processHtml2Pdf() {
  const html = document.getElementById('htmlContent').value;
  if (!html.trim()) { toast('Enter HTML first','error'); return; }
  // Use a hidden DOM node + html2canvas + jsPDF for fidelity
  const container = document.createElement('div');
  container.style.cssText = 'position:absolute;top:-9999px;left:0;width:794px;padding:40px;background:#fff;color:#000;font-family:Inter,sans-serif;font-size:14px;line-height:1.5;';
  container.innerHTML = html;
  document.body.appendChild(container);
  try {
    const canvas = await html2canvas(container, { scale: 2, backgroundColor: '#ffffff', logging: false, useCORS: true });
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    const pw = pdf.internal.pageSize.getWidth();
    const ph = pdf.internal.pageSize.getHeight();
    const imgW = pw;
    const imgH = canvas.height * pw / canvas.width;
    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    let y = 0;
    let remaining = imgH;
    pdf.addImage(imgData, 'JPEG', 0, y, imgW, imgH);
    remaining -= ph;
    while (remaining > 0) {
      pdf.addPage();
      y -= ph;
      pdf.addImage(imgData, 'JPEG', 0, y, imgW, imgH);
      remaining -= ph;
    }
    const blob = pdf.output('blob');
    saveAs(blob, 'html-to-pdf.pdf');
    showResult('html-to-pdf.pdf', blob.size, 'PDF');
    toast('HTML converted','success');
  } finally { container.remove(); }
}

async function processText2Pdf() {
  const { jsPDF } = window.jspdf;
  const text = document.getElementById('textContent').value;
  if (!text.trim()) { toast('Enter text first','error'); return; }
  const size = parseInt(document.getElementById('textFontSize').value) || 12;
  const pageSize = document.getElementById('textPageSize').value || 'a4';
  const doc = new jsPDF('p', 'mm', pageSize);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(size);
  const pw = doc.internal.pageSize.getWidth();
  const ph = doc.internal.pageSize.getHeight();
  const margin = 15;
  const lines = doc.splitTextToSize(text, pw - margin*2);
  let y = margin + size/2;
  const lh = size * 0.4;
  for (let i = 0; i < lines.length; i++) {
    if (y > ph - margin) { doc.addPage(); y = margin + size/2; }
    doc.text(lines[i], margin, y);
    y += lh * 1.6;
  }
  const blob = doc.output('blob');
  saveAs(blob, 'text-to-pdf.pdf');
  showResult('text-to-pdf.pdf', blob.size, 'PDF');
  toast('Text converted','success');
}

async function processPdf2Text() {
  let all = '';
  for (let n = 0; n < state.files.length; n++) {
    const f = state.files[n];
    if (!f.pdfDoc) continue;
    await loadPdfJs(f);
    const pc = f.pdfjsDoc.numPages;
    all += `\n\n===== ${f.name} =====\n`;
    for (let i = 1; i <= pc; i++) {
      const page = await f.pdfjsDoc.getPage(i);
      const content = await page.getTextContent();
      const str = content.items.map(it => it.str).join(' ');
      all += `\n--- Page ${i} ---\n${str}\n`;
      showProgress(i/pc*100, `Extracting page ${i} of ${pc}…`);
    }
  }
  const blob = new Blob([all], { type: 'text/plain;charset=utf-8' });
  saveAs(blob, 'extracted-text.txt');
  showResult('extracted-text.txt', blob.size, 'TXT');
  toast('Text extracted','success');
}

async function processEdit() {
  const f = state.files[0];
  if (!f.pdfDoc) return;
  const text = document.getElementById('editText').value;
  if (!text.trim()) { toast('Enter text to add','error'); return; }
  const pn = parseInt(document.getElementById('editPage').value) || 1;
  const x = parseFloat(document.getElementById('editX').value) || 50;
  const y = parseFloat(document.getElementById('editY').value) || 50;
  const sz = parseInt(document.getElementById('editFontSize').value) || 24;
  const rgb = hexToRgb(document.getElementById('editColor').value);
  if (pn < 1 || pn > f.pdfDoc.getPageCount()) { toast('Invalid page','error'); return; }
  const page = f.pdfDoc.getPage(pn-1);
  page.drawText(text, { x, y, size: sz, color: PDFLib.rgb(rgb.r/255, rgb.g/255, rgb.b/255) });
  const bytes = await f.pdfDoc.save();
  downloadAndShow(bytes, `edited_${f.name}`);
  toast('Text added','success');
}

async function processWatermark() {
  const type = document.getElementById('wmType').value;
  const pos = document.getElementById('wmPos').value;
  const opacity = parseFloat(document.getElementById('wmOpacity').value) || 0.3;
  for (let n = 0; n < state.files.length; n++) {
    const f = state.files[n];
    if (!f.pdfDoc) continue;
    const pages = f.pdfDoc.getPages();
    let wmImg = null;
    if (type === 'image' && state.watermarkImage) {
      const ext = state.watermarkImage.name.toLowerCase().endsWith('.png') ? 'png' : 'jpg';
      wmImg = ext === 'png' ? await f.pdfDoc.embedPng(state.watermarkImage.bytes) : await f.pdfDoc.embedJpg(state.watermarkImage.bytes);
    }
    for (const page of pages) {
      const { width, height } = page.getSize();
      let x = width/2, y = height/2;
      if (pos === 'top-left') { x = 50; y = height - 50; }
      else if (pos === 'top-right') { x = width - 50; y = height - 50; }
      else if (pos === 'bottom-left') { x = 50; y = 50; }
      else if (pos === 'bottom-right') { x = width - 50; y = 50; }
      if (type === 'text') {
        const txt = document.getElementById('wmText').value || 'WATERMARK';
        const sz = parseInt(document.getElementById('wmSize').value) || 48;
        const rgb = hexToRgb(document.getElementById('wmColor').value);
        if (pos === 'tile') {
          for (let tx = 0; tx < width; tx += sz*4) for (let ty = 0; ty < height; ty += sz*3)
            page.drawText(txt, { x: tx, y: ty, size: sz, color: PDFLib.rgb(rgb.r/255,rgb.g/255,rgb.b/255), opacity, rotate: PDFLib.degrees(-30) });
        } else {
          page.drawText(txt, { x, y, size: sz, color: PDFLib.rgb(rgb.r/255,rgb.g/255,rgb.b/255), opacity, rotate: PDFLib.degrees(-45) });
        }
      } else if (wmImg) {
        const d = wmImg.scale(0.3);
        if (pos === 'tile') {
          for (let tx = 0; tx < width; tx += d.width+60) for (let ty = 0; ty < height; ty += d.height+40)
            page.drawImage(wmImg, { x: tx, y: ty, width: d.width, height: d.height, opacity });
        } else {
          page.drawImage(wmImg, { x: x - d.width/2, y: y - d.height/2, width: d.width, height: d.height, opacity });
        }
      }
    }
    const bytes = await f.pdfDoc.save();
    downloadAndShow(bytes, `watermarked_${f.name}`);
    showProgress((n+1)/state.files.length*100, `Watermarking ${n+1} of ${state.files.length}…`);
  }
  toast('Watermark applied','success');
}

async function processPageNumber() {
  const pos = document.getElementById('pnPos').value;
  const fmt = document.getElementById('pnFormat').value;
  const start = parseInt(document.getElementById('pnStart').value) || 1;
  const sz = parseInt(document.getElementById('pnSize').value) || 12;
  for (let n = 0; n < state.files.length; n++) {
    const f = state.files[n];
    if (!f.pdfDoc) continue;
    const pages = f.pdfDoc.getPages();
    const total = pages.length;
    pages.forEach((page, idx) => {
      const { width, height } = page.getSize();
      const num = start + idx;
      let label = String(num);
      if (fmt === 'n_of_N') label = `${num} of ${total}`;
      else if (fmt === 'page_n') label = `Page ${num}`;
      else if (fmt === 'page_n_of_N') label = `Page ${num} of ${total}`;
      let x = width/2, y = 20;
      if (pos === 'bottom-left')  { x = 36; y = 20; }
      else if (pos === 'bottom-right') { x = width - 60; y = 20; }
      else if (pos === 'top-center')  { y = height - 24; }
      else if (pos === 'top-left')    { x = 36; y = height - 24; }
      else if (pos === 'top-right')   { x = width - 60; y = height - 24; }
      page.drawText(label, { x, y, size: sz, color: PDFLib.rgb(0.35,0.35,0.4) });
    });
    const bytes = await f.pdfDoc.save();
    downloadAndShow(bytes, `numbered_${f.name}`);
    showProgress((n+1)/state.files.length*100, `Numbering ${n+1} of ${state.files.length}…`);
  }
  toast('Page numbers added','success');
}

async function processCrop() {
  const f = state.files[0];
  if (!f.pdfDoc) return;
  const m = parseFloat(document.getElementById('cropMargin').value) || 36;
  const pages = f.pdfDoc.getPages();
  pages.forEach(p => {
    const { width, height } = p.getSize();
    p.setCropBox(m, m, Math.max(width - m*2, 10), Math.max(height - m*2, 10));
  });
  const bytes = await f.pdfDoc.save();
  downloadAndShow(bytes, `cropped_${f.name}`);
  toast('Pages cropped','success');
}

async function processProtect() {
  const pw = document.getElementById('userPw').value;
  const pw2 = document.getElementById('userPw2').value;
  if (!pw) { toast('Enter a password','error'); return; }
  if (pw !== pw2) { toast('Passwords do not match','error'); return; }
  const allowPrint = document.getElementById('allowPrint').checked;
  const allowCopy = document.getElementById('allowCopy').checked;
  for (let n = 0; n < state.files.length; n++) {
    const f = state.files[n];
    if (!f.pdfDoc) continue;
    try {
      const bytes = await f.pdfDoc.save({
        useObjectStreams: false,
        encryption: {
          userPassword: pw,
          ownerPassword: pw + '_owner',
          permissions: {
            printing: allowPrint ? 'highResolution' : 'none',
            modifying: false,
            copying: allowCopy,
            annotating: false,
            fillingForms: false,
            contentAccessibility: true,
            documentAssembly: false
          }
        }
      });
      downloadAndShow(bytes, `protected_${f.name}`);
    } catch(e) {
      // pdf-lib free version may not support encryption — fall back to a warning
      toast(`Encryption not available in this build for ${f.name}. Try a different tool.`,'warning');
    }
    showProgress((n+1)/state.files.length*100, `Protecting ${n+1} of ${state.files.length}…`);
  }
  toast('Protection applied','success');
}

async function processUnlock() {
  const pw = document.getElementById('unlockPw').value;
  if (!pw) { toast('Enter the password','error'); return; }
  for (const f of state.files) {
    try {
      const doc = await PDFLib.PDFDocument.load(f.arrayBuffer, { password: pw });
      const bytes = await doc.save();
      downloadAndShow(bytes, `unlocked_${f.name}`);
    } catch(e) { toast(`Wrong password for ${f.name}`,'error'); }
  }
}

async function processSign() {
  const f = state.files[0];
  if (!f.pdfDoc) return;
  const canvas = document.getElementById('sigPad');
  if (!canvas || isSignatureEmpty(canvas)) { toast('Draw or type a signature first','error'); return; }
  const pos = document.getElementById('signPos').value;
  const sigBytes = dataUrlToUint8Array(canvas.toDataURL('image/png'));
  const img = await f.pdfDoc.embedPng(sigBytes);
  const d = img.scale(0.4);
  const pages = f.pdfDoc.getPages();
  const page = pages[pages.length - 1];
  const { width, height } = page.getSize();
  let x = width - d.width - 40, y = 40;
  if (pos === 'bottom-left') { x = 40; y = 40; }
  else if (pos === 'top-right') { y = height - d.height - 40; }
  else if (pos === 'top-left') { x = 40; y = height - d.height - 40; }
  else if (pos === 'center') { x = width/2 - d.width/2; y = height/2 - d.height/2; }
  page.drawImage(img, { x, y, width: d.width, height: d.height });
  const bytes = await f.pdfDoc.save();
  downloadAndShow(bytes, `signed_${f.name}`);
  toast('Signature applied','success');
}

async function processRedact() {
  const f = state.files[0];
  if (!f.pdfDoc) return;
  const input = document.getElementById('redactBoxes').value.trim();
  if (!input) { toast('Enter at least one rectangle','error'); return; }
  const pages = f.pdfDoc.getPages();
  const lines = input.split('\n').map(l => l.split(',').map(s => parseFloat(s.trim())));
  for (const [p, x, y, w, h] of lines) {
    if ([p,x,y,w,h].some(isNaN)) continue;
    if (p < 1 || p > pages.length) continue;
    pages[p-1].drawRectangle({ x, y, width: w, height: h, color: PDFLib.rgb(0,0,0) });
  }
  const bytes = await f.pdfDoc.save();
  downloadAndShow(bytes, `redacted_${f.name}`);
  toast('Redaction applied — visual only. For true redaction (text removal), a server-side tool is needed.','warning');
}

async function processCompare() {

function parsePagesInput(input, pageCount) {
  if (!input || !input.trim()) return [];
  const set = new Set();
  input.split(',').forEach(part => {
    part = part.trim();
    if (!part) return;
    if (part.includes('-')) {
      const [a, b] = part.split('-').map(x => parseInt(x) - 1);
      if (!isNaN(a) && !isNaN(b)) for (let i = Math.min(a,b); i <= Math.max(a,b); i++)
        if (i >= 0 && i < pageCount) set.add(i);
    } else {
      const idx = parseInt(part) - 1;
      if (idx >= 0 && idx < pageCount) set.add(idx);
    }
  });
  return Array.from(set).sort((a,b) => a-b);
}

function downloadAndShow(bytes, filename) {
  const blob = new Blob([bytes], { type: 'application/pdf' });

function fileToDataUrl(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}
function loadImage(src) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => res(img);
    img.onerror = rej;
    img.src = src;
  });
}
function hexToRgb(hex) {
  return { r: parseInt(hex.slice(1,3),16), g: parseInt(hex.slice(3,5),16), b: parseInt(hex.slice(5,7),16) };
}
// Defensive readers — never throw if the setting hasn't rendered yet
function optVal(id, dflt) {
  const el = document.getElementById(id);
  return (el && el.value !== undefined) ? el.value : (dflt !== undefined ? dflt : '');
}
function optInt(id, dflt) {
  const v = parseInt(optVal(id, dflt));
  return isNaN(v) ? (dflt !== undefined ? dflt : 0) : v;
}
function optFloat(id, dflt) {
  const v = parseFloat(optVal(id, dflt));
  return isNaN(v) ? (dflt !== undefined ? dflt : 0) : v;
}
function optCheck(id, dflt) {
  const el = document.getElementById(id);
  return el ? !!el.checked : !!dflt;
}
function dataUrlToUint8Array(dataUrl) {
  const raw = atob(dataUrl.split(',')[1]);
  const bytes = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
  return bytes;
}

// ---- Signature pad ----
function setupSignaturePad() {
  const canvas = document.getElementById('sigPad');
  if (!canvas) return;
  // Set the actual pixel size for crisp drawing
  requestAnimationFrame(() => {
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
  });
  let drawing = false;
  const getPos = e => {
    const r = canvas.getBoundingClientRect();
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: cx - r.left, y: cy - r.top };
  };
  const start = e => { drawing = true; const p = getPos(e); const ctx = canvas.getContext('2d'); ctx.beginPath(); ctx.moveTo(p.x, p.y); e.preventDefault(); };
  const move  = e => { if (!drawing) return; const p = getPos(e); const ctx = canvas.getContext('2d'); ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault(); };
  const end   = e => { drawing = false; e.preventDefault && e.preventDefault(); };
  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  canvas.addEventListener('mouseup', end);
  canvas.addEventListener('mouseleave', end);
  canvas.addEventListener('touchstart', start, { passive: false });
  canvas.addEventListener('touchmove',  move,  { passive: false });
  canvas.addEventListener('touchend',   end,   { passive: false });
}
function clearSignature() {
  const c = document.getElementById('sigPad');
  if (c) c.getContext('2d').clearRect(0, 0, c.width, c.height);
}
function isSignatureEmpty(c) {
  const ctx = c.getContext('2d');
  const px = ctx.getImageData(0,0,c.width,c.height).data;
  for (let i = 3; i < px.length; i += 4) if (px[i] > 0) return false;
  return true;
}
function useTypedSignature() {
  const txt = prompt('Type your name to use as signature:');
  if (!txt) return;
  const c = document.getElementById('sigPad');
  const ctx = c.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  ctx.clearRect(0, 0, c.width, c.height);
  const w = c.width / dpr, h = c.height / dpr;
  ctx.font = 'italic 700 42px "Brush Script MT", "Lucida Handwriting", cursive';
  ctx.fillStyle = '#000';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(txt, w/2, h/2);
}
