// ---- N-up ----
async function processNUp() {
  const f = state.files[0]; if (!f.pdfDoc) return;
  const n = parseInt(document.getElementById('nupCount').value) || 4;
  const orient = document.getElementById('nupOrient').value;
  const border = document.getElementById('nupBorder').checked;

  // Grid choice
  const grids = { 2:[2,1], 4:[2,2], 6:[3,2], 9:[3,3], 16:[4,4] };
  let [cols, rows] = grids[n];

  // Use pdf.js to rasterize each page to images, then place 'n' per output page
  await loadPdfJs(f);
  const totalIn = f.pdfjsDoc.numPages;

  const outDoc = await PDFLib.PDFDocument.create();
  const pageW = orient === 'landscape' ? 842 : 595;
  const pageH = orient === 'landscape' ? 595 : 842;
  // Auto: rotate so the cells stay roughly portrait
  const finalW = (orient === 'auto' && cols > rows) ? 842 : pageW;
  const finalH = (orient === 'auto' && cols > rows) ? 595 : pageH;

  for (let p = 1; p <= totalIn; p += n) {
    const sheet = outDoc.addPage([finalW, finalH]);
    const cellW = finalW / cols;
    const cellH = finalH / rows;
    for (let i = 0; i < n; i++) {
      const idx = p + i;
      if (idx > totalIn) break;
      const col = i % cols;
      const row = Math.floor(i / cols);
      const x = col * cellW;
      const y = finalH - (row + 1) * cellH;

      const canvas = document.createElement('canvas');
      await renderPdfJsPage(f.pdfjsDoc, idx, canvas, 1.5);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      const jpgBytes = dataUrlToUint8Array(dataUrl);
      const img = await outDoc.embedJpg(jpgBytes);
      const ratio = Math.min(cellW / img.width, cellH / img.height) * 0.94;
      const drawW = img.width * ratio;
      const drawH = img.height * ratio;
      const dx = x + (cellW - drawW) / 2;
      const dy = y + (cellH - drawH) / 2;
      sheet.drawImage(img, { x: dx, y: dy, width: drawW, height: drawH });
      if (border) {
        sheet.drawRectangle({ x: x + 4, y: y + 4, width: cellW - 8, height: cellH - 8, borderColor: PDFLib.rgb(0.7,0.7,0.75), borderWidth: 0.5 });
      }
    }
    showProgress(Math.min(99, p / totalIn * 100), `Composing sheet ${Math.ceil(p/n)}…`);
  }
  const bytes = await outDoc.save();
  downloadAndShow(bytes, `${n}-up_${f.name}`);
  toast('N-up layout created', 'success');
}

// ---- Insert blank pages ----
async function processInsertBlank() {
  const f = state.files[0]; if (!f.pdfDoc) return;
  const after = parseInt(document.getElementById('ibAfter').value) || 0;
  const count = Math.min(50, Math.max(1, parseInt(document.getElementById('ibCount').value) || 1));
  const sizeChoice = document.getElementById('ibSize').value;
  const pages = f.pdfDoc.getPages();
  let w = 595, h = 842;
  if (sizeChoice === 'letter') { w = 612; h = 792; }
  else if (sizeChoice === 'match' && pages.length) {
    const ref = pages[Math.min(after - 1, pages.length - 1)] || pages[0];
    ({ width: w, height: h } = ref.getSize());
  }
  for (let i = 0; i < count; i++) {
    f.pdfDoc.insertPage(Math.min(after + i, f.pdfDoc.getPageCount()), [w, h]);
  }
  const bytes = await f.pdfDoc.save();
  downloadAndShow(bytes, `with-blanks_${f.name}`);
  toast(`${count} blank page(s) inserted`, 'success');
}

// ---- Flatten (rasterize) ----
async function processFlatten() {
  const dpi = parseInt(document.getElementById('flatDpi').value) || 200;
  const scale = dpi / 72;
  for (let n = 0; n < state.files.length; n++) {
    const f = state.files[n];
    if (!f.pdfDoc) continue;
    await loadPdfJs(f);
    const total = f.pdfjsDoc.numPages;
    const out = await PDFLib.PDFDocument.create();
    for (let i = 1; i <= total; i++) {
      const canvas = document.createElement('canvas');
      await renderPdfJsPage(f.pdfjsDoc, i, canvas, scale);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
      const img = await out.embedJpg(dataUrlToUint8Array(dataUrl));
      const page = out.addPage([img.width / scale, img.height / scale]);
      page.drawImage(img, { x: 0, y: 0, width: page.getWidth(), height: page.getHeight() });
      showProgress(i / total * 100, `Flattening page ${i} of ${total}…`);
    }
    const bytes = await out.save();
    downloadAndShow(bytes, `flattened_${f.name}`);
  }
  toast('Flatten complete', 'success');
}

// ---- Header & Footer ----
async function processHeader() {
  const hL = document.getElementById('hdrLeft').value;
  const hC = document.getElementById('hdrCenter').value;
  const hR = document.getElementById('hdrRight').value;
  const fL = document.getElementById('ftrLeft').value;
  const fC = document.getElementById('ftrCenter').value;
  const fR = document.getElementById('ftrRight').value;
  const sz = parseInt(document.getElementById('hdrSize').value) || 10;
  const rgb = hexToRgb(document.getElementById('hdrColor').value);
  const color = PDFLib.rgb(rgb.r/255, rgb.g/255, rgb.b/255);
  const today = new Date().toISOString().slice(0,10);
  for (let n = 0; n < state.files.length; n++) {
    const f = state.files[n];
    if (!f.pdfDoc) continue;
    const pages = f.pdfDoc.getPages();
    const total = pages.length;
    pages.forEach((page, idx) => {
      const { width, height } = page.getSize();
      const subst = (s) => (s || '').replace(/\{page\}/g, idx+1).replace(/\{total\}/g, total).replace(/\{filename\}/g, f.name).replace(/\{date\}/g, today);
      const drawAt = (text, ax, ay) => { if (!text) return; page.drawText(text, { x: ax, y: ay, size: sz, color }); };
      // top margin and bottom margin = 24pt
      const top = height - 24, bot = 18;
      if (hL) drawAt(subst(hL), 36, top);
      if (hC) { const t = subst(hC); const tw = t.length * sz * 0.5; drawAt(t, width/2 - tw/2, top); }
      if (hR) { const t = subst(hR); const tw = t.length * sz * 0.5; drawAt(t, width - 36 - tw, top); }
      if (fL) drawAt(subst(fL), 36, bot);
      if (fC) { const t = subst(fC); const tw = t.length * sz * 0.5; drawAt(t, width/2 - tw/2, bot); }
      if (fR) { const t = subst(fR); const tw = t.length * sz * 0.5; drawAt(t, width - 36 - tw, bot); }
    });
    const bytes = await f.pdfDoc.save();
    downloadAndShow(bytes, `hf_${f.name}`);
    showProgress((n+1)/state.files.length*100, `Headers ${n+1} of ${state.files.length}…`);
  }
  toast('Header & footer applied', 'success');
}

// ---- Background color ----
async function processBackground() {
  const rgb = hexToRgb(document.getElementById('bgColor').value);
  const color = PDFLib.rgb(rgb.r/255, rgb.g/255, rgb.b/255);
  for (let n = 0; n < state.files.length; n++) {
    const f = state.files[n];
    if (!f.pdfDoc) continue;
    const pages = f.pdfDoc.getPages();
    pages.forEach(page => {
      const { width, height } = page.getSize();
      // Draw at the absolute back by inserting at index 0 — pdf-lib draws in call order,
      // so we have to create a NEW page then copy content. Simpler: draw at bottom; visible
      // only where original page is transparent.
      page.drawRectangle({ x: 0, y: 0, width, height, color });
    });
    const bytes = await f.pdfDoc.save();
    downloadAndShow(bytes, `bg_${f.name}`);
  }
  toast('Background applied (note: drawn over transparent regions)', 'success');
}

// ---- Bates numbering ----
async function processBates() {
  const prefix = document.getElementById('batesPrefix').value || '';
  const start = parseInt(document.getElementById('batesStart').value) || 1;
  const pad = parseInt(document.getElementById('batesPad').value) || 6;
  const pos = document.getElementById('batesPos').value;
  let counter = start;
  for (let n = 0; n < state.files.length; n++) {
    const f = state.files[n];
    if (!f.pdfDoc) continue;
    const pages = f.pdfDoc.getPages();
    pages.forEach(page => {
      const { width, height } = page.getSize();
      const label = prefix + String(counter).padStart(pad, '0');
      counter++;
      let x = width - 100, y = 14;
      if (pos === 'bottom-left') { x = 36; y = 14; }
      else if (pos === 'top-left') { x = 36; y = height - 18; }
      else if (pos === 'top-right') { x = width - 100; y = height - 18; }
      page.drawText(label, { x, y, size: 10, color: PDFLib.rgb(0.4,0.4,0.45) });
    });
    const bytes = await f.pdfDoc.save();
    downloadAndShow(bytes, `bates_${f.name}`);
  }
  toast(`Bates numbers ${prefix}${String(start).padStart(pad,'0')} – ${prefix}${String(counter-1).padStart(pad,'0')}`, 'success');
}

// ---- Scan to PDF (camera) ----
let scanStream = null;
const scanPages = [];

async function startScanner() {
  try {
    const sel = document.getElementById('scanCamera');
    const devices = await navigator.mediaDevices.enumerateDevices();
    const cams = devices.filter(d => d.kind === 'videoinput');
    sel.innerHTML = cams.map(c => `<option value="${c.deviceId}">${c.label || 'Camera'}</option>`).join('');
    const constraints = { video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } } };
    if (cams.length && sel.value) constraints.video.deviceId = { exact: sel.value };
    scanStream = await navigator.mediaDevices.getUserMedia(constraints);
    const video = document.getElementById('scanVideo');
    video.srcObject = scanStream;
    document.getElementById('scanPreviewWrap').style.display = 'block';
    document.getElementById('captureBtn').disabled = false;
    updateProcessButton();
  } catch (e) {
    toast('Camera permission denied or unavailable', 'error');
  }
}
function captureScanPage() {
  const video = document.getElementById('scanVideo');
  if (!video || !video.videoWidth) return;
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  if (document.getElementById('scanGrayscale').checked) {
    ctx.filter = 'grayscale(1) contrast(1.1)';
  }
  ctx.drawImage(video, 0, 0);
  const data = canvas.toDataURL('image/jpeg', 0.85);
  scanPages.push({ w: canvas.width, h: canvas.height, dataUrl: data });
  // Add thumb
  const thumb = document.createElement('img');
  thumb.src = data;
  thumb.style.cssText = 'width:100%;border-radius:6px;border:1px solid var(--border);';
  document.getElementById('scanThumbs').appendChild(thumb);
  document.getElementById('scanPageCount').textContent = scanPages.length;
  toast('Page captured', 'success');
  state.scanCount = scanPages.length;
  document.getElementById('processBtn').disabled = scanPages.length === 0;
}
async function processScan() {
  if (!scanPages.length) { toast('Capture at least one page first', 'error'); return; }
  const { jsPDF } = window.jspdf;
  let doc;
  for (let i = 0; i < scanPages.length; i++) {
    const p = scanPages[i];
    const orient = p.w > p.h ? 'l' : 'p';
    const w = p.w * 25.4 / 96; // approx mm
    const h = p.h * 25.4 / 96;
    const format = [w, h];
    if (!doc) doc = new jsPDF({ orientation: orient, unit: 'mm', format });
    else doc.addPage(format, orient);
    doc.addImage(p.dataUrl, 'JPEG', 0, 0, w, h);
    showProgress((i+1)/scanPages.length*100, `Adding scan ${i+1}…`);
  }
  const blob = doc.output('blob');
  saveAs(blob, 'scanned.pdf');
  showResult('scanned.pdf', blob.size, 'PDF');
  // Stop camera & reset
  if (scanStream) scanStream.getTracks().forEach(t => t.stop());
  scanPages.length = 0;
  toast('Scan saved', 'success');
}

// ---- ZIP to PDF ----
async function processZip2Pdf() {
  const f = state.files[0]; if (!f) return;
  const zip = await JSZip.loadAsync(f.arrayBuffer);
  const imageFiles = Object.keys(zip.files)
    .filter(k => /\.(jpg|jpeg|png|webp)$/i.test(k) && !zip.files[k].dir)
    .sort();
  if (!imageFiles.length) { toast('No images found in ZIP', 'error'); return; }
  const { jsPDF } = window.jspdf;
  let doc;
  for (let i = 0; i < imageFiles.length; i++) {
    const name = imageFiles[i];
    const blob = await zip.files[name].async('blob');
    const dataUrl = await new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(blob); });
    const img = await loadImage(dataUrl);
    const orient = img.width > img.height ? 'l' : 'p';
    const w = img.width * 25.4 / 96;
    const h = img.height * 25.4 / 96;
    if (!doc) doc = new jsPDF({ orientation: orient, unit: 'mm', format: [w, h] });
    else doc.addPage([w, h], orient);
    const fmt = name.toLowerCase().endsWith('.png') ? 'PNG' : 'JPEG';
    doc.addImage(dataUrl, fmt, 0, 0, w, h);
    showProgress((i+1)/imageFiles.length*100, `Adding ${name}…`);
  }
  const blob = doc.output('blob');
  saveAs(blob, f.name.replace(/\.zip$/i, '.pdf'));
  showResult(f.name.replace(/\.zip$/i, '.pdf'), blob.size, 'PDF');
  toast(`${imageFiles.length} images combined`, 'success');
}

// ---- PDF to Word (DOCX) ----
async function processPdf2Word() {
  const breakCheckbox = document.getElementById('docxPageBreak');
  const addBreaks = breakCheckbox ? breakCheckbox.checked : true;
  for (let n = 0; n < state.files.length; n++) {
    const f = state.files[n];
    if (!f.pdfDoc) continue;
    await loadPdfJs(f);
    const pc = f.pdfjsDoc.numPages;
    // Build minimal DOCX (Office Open XML) — text-only with paragraphs & page breaks
    let docXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:body>';
    for (let i = 1; i <= pc; i++) {
      const page = await f.pdfjsDoc.getPage(i);
      const tc = await page.getTextContent();
      // Group items by 'y' to recreate lines
      const lines = {};
      tc.items.forEach(it => {
        const y = Math.round(it.transform[5]);
        (lines[y] = lines[y] || []).push(it);
      });
      const ys = Object.keys(lines).map(Number).sort((a, b) => b - a);
      ys.forEach(y => {
        const sorted = lines[y].sort((a, b) => a.transform[4] - b.transform[4]);
        const lineText = sorted.map(it => it.str).join(' ').replace(/\s+/g, ' ').trim();
        if (lineText) {
          docXml += '<w:p><w:r><w:t xml:space="preserve">' + escapeXml(lineText) + '</w:t></w:r></w:p>';
        }
      });
      if (addBreaks && i < pc) {
        docXml += '<w:p><w:r><w:br w:type="page"/></w:r></w:p>';
      }
      showProgress(i/pc*100, `Extracting page ${i} of ${pc}…`);
    }
    docXml += '</w:body></w:document>';

    const zip = new JSZip();
    zip.file('[Content_Types].xml',
      '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
      '<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">' +
      '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>' +
      '<Default Extension="xml" ContentType="application/xml"/>' +
      '<Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>' +
      '</Types>'
    );
    zip.folder('_rels').file('.rels',
      '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>' +
      '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' +
      '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>' +
      '</Relationships>'
    );
    zip.folder('word').file('document.xml', docXml);
    const blob = await zip.generateAsync({ type: 'blob', mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
    saveAs(blob, f.name.replace(/\.pdf$/i, '.docx'));
    showResult(f.name.replace(/\.pdf$/i, '.docx'), blob.size, 'DOCX');
  }
  toast('PDFs exported to Word', 'success');
}
function escapeXml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;'); }

// ---- PDF to Excel (CSV) ----
async function processPdf2Excel() {
  const f = state.files[0]; if (!f.pdfDoc) return;
  const sep = document.getElementById('csvSep').value === '\\t' ? '\t' : document.getElementById('csvSep').value;
  await loadPdfJs(f);
  const pc = f.pdfjsDoc.numPages;
  let csv = '';
  for (let i = 1; i <= pc; i++) {
    const page = await f.pdfjsDoc.getPage(i);
    const tc = await page.getTextContent();
    // Bucket items by y (rounded), then sort by x — produces row-aligned cells
    const rows = {};
    tc.items.forEach(it => {
      const y = Math.round(it.transform[5] / 2) * 2;
      (rows[y] = rows[y] || []).push({ x: it.transform[4], str: it.str.trim() });
    });
    const ys = Object.keys(rows).map(Number).sort((a, b) => b - a);
    ys.forEach(y => {
      const cells = rows[y].sort((a, b) => a.x - b.x).map(c => c.str).filter(Boolean);
      if (cells.length) {
        csv += cells.map(c => /[",\n\t]/.test(c) ? '"' + c.replace(/"/g, '""') + '"' : c).join(sep) + '\n';
      }
    });
    csv += '\n'; // page separator
    showProgress(i/pc*100, `Extracting page ${i} of ${pc}…`);
  }
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  saveAs(blob, f.name.replace(/\.pdf$/i, '.csv'));
  showResult(f.name.replace(/\.pdf$/i, '.csv'), blob.size, 'CSV');
  toast('CSV exported', 'success');
}

        <span id="rdFindStatus" style="font-size:11.5px;color:var(--text-3);"></span>
      </div>
      <div id="rdCanvasWrap" style="padding:20px;background:var(--bg-3);min-height:60vh;text-align:center;overflow:auto;max-height:80vh;">

      </div>
    </div>
  `;
  readerState.pageNum = 1;
  readerState.scale = 1.0;

}
async function renderReaderPage() {
  const f = state.files[0]; if (!f?.pdfjsDoc) return;
  const canvas = document.getElementById('rdCanvas');
  if (!canvas) return;
  await renderPdfJsPage(f.pdfjsDoc, readerState.pageNum, canvas, readerState.scale * 1.5);
  const z = document.getElementById('rdZoom'); if (z) z.textContent = Math.round(readerState.scale * 100) + '%';
  const p = document.getElementById('rdPage'); if (p) p.value = readerState.pageNum;
}
function readerPrev() { readerState.pageNum = Math.max(1, readerState.pageNum - 1); renderReaderPage(); }
function readerNext() { const f = state.files[0]; if (!f?.pdfjsDoc) return; readerState.pageNum = Math.min(f.pdfjsDoc.numPages, readerState.pageNum + 1); renderReaderPage(); }
function readerGoto(n) { const f = state.files[0]; if (!f?.pdfjsDoc) return; readerState.pageNum = Math.min(f.pdfjsDoc.numPages, Math.max(1, parseInt(n)||1)); renderReaderPage(); }
function readerZoom(factor) { readerState.scale = Math.max(0.5, Math.min(3, readerState.scale * factor)); renderReaderPage(); }
async function readerFind(query) {
  const status = document.getElementById('rdFindStatus');
  if (!query || query.length < 2) { status.textContent = ''; return; }
  const f = state.files[0]; if (!f?.pdfjsDoc) return;
  const hits = [];
  for (let i = 1; i <= f.pdfjsDoc.numPages; i++) {
    const page = await f.pdfjsDoc.getPage(i);
    const tc = await page.getTextContent();
    const txt = tc.items.map(it => it.str).join(' ').toLowerCase();
    if (txt.includes(query.toLowerCase())) hits.push(i);
  }
  status.textContent = hits.length ? `Found on page(s): ${hits.slice(0,8).join(', ')}${hits.length>8?'…':''}` : 'Not found';
  if (hits.length) { readerState.pageNum = hits[0]; renderReaderPage(); }
}

}

// ============================================================
//  RECENT FILES (in-memory + safe localStorage)
// ============================================================
const RECENT_KEY = 'pdf44-recent';
function safeLoadRecent() {
  try { return JSON.parse(localStorage.getItem(RECENT_KEY) || '[]'); } catch(e) { return []; }
}
function safeSaveRecent(list) {
  try { localStorage.setItem(RECENT_KEY, JSON.stringify(list.slice(0, 8))); } catch(e) {}
}
function addRecent(filename, size, tool) {
  const list = safeLoadRecent();
  list.unshift({ name: filename, size, tool, at: Date.now() });
  safeSaveRecent(list);
}

// ============================================================
//  FAVORITES (pinned tools)
// ============================================================
const FAV_KEY = 'pdf44-favs';
function loadFavs() {
  try { return JSON.parse(localStorage.getItem(FAV_KEY) || '[]'); } catch(e) { return []; }
}
function saveFavs(list) { try { localStorage.setItem(FAV_KEY, JSON.stringify(list)); } catch(e){} }
function toggleFav(toolKey, ev) {
  if (ev) { ev.stopPropagation(); ev.preventDefault(); }
  const favs = loadFavs();
  const idx = favs.indexOf(toolKey);
  if (idx >= 0) favs.splice(idx, 1); else favs.unshift(toolKey);
  saveFavs(favs);
  renderSidebar();
  if (state.currentTool === 'home') render();
  toast(idx >= 0 ? 'Removed from favorites' : 'Pinned to favorites', 'success');
}

          <input type="text" id="cmdInput" placeholder="Type to search tools…" autofocus
            style="width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border-strong);border-radius:8px;font-size:14px;color:var(--text);">
        </div>
        <div id="cmdResults" style="max-height:50vh;overflow-y:auto;padding:8px;"></div>
      </div>
    </div>`;
  // Replace any existing
  const old = document.getElementById('cmdPalette'); if (old) old.remove();
  document.body.insertAdjacentHTML('beforeend', html);
  const input = document.getElementById('cmdInput');
  function update() {
    const q = input.value.toLowerCase().trim();
    const results = allTools.filter(([k, t]) => !q || k.includes(q) || t.title.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q)).slice(0, 10);
    document.getElementById('cmdResults').innerHTML = results.map(([k, t]) => `
      <div class="cmd-result" onclick="closeCommandPalette();route('${k}')" style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;cursor:pointer;">
        <span style="width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;" class="ti-${t.color}">${icon(t.iconKey, {size:16, stroke:2.2})}</span>
        <div style="flex:1;min-width:0;">
          <div style="font-size:13.5px;font-weight:600;">${t.title}</div>
          <div style="font-size:11.5px;color:var(--text-3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${t.desc}</div>
        </div>
      </div>
    `).join('') || '<div style="padding:20px;text-align:center;color:var(--text-3);font-size:13px;">No tools match</div>';
    document.querySelectorAll('.cmd-result').forEach(el => {
      el.addEventListener('mouseenter', () => el.style.background = 'var(--bg-glass)');
      el.addEventListener('mouseleave', () => el.style.background = '');
    });
  }
  input.addEventListener('input', update);
  input.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeCommandPalette();
    if (e.key === 'Enter') {
      const first = document.querySelector('.cmd-result');
      if (first) first.click();
    }
  });
  update();
}
function closeCommandPalette() {
  const el = document.getElementById('cmdPalette'); if (el) el.remove();
}

// ============================================================
//  KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', e => {
  const mod = e.metaKey || e.ctrlKey;
  if (mod && e.key.toLowerCase() === 'k') { e.preventDefault(); openCommandPalette(); return; }
  if (mod && e.key.toLowerCase() === 'h') { e.preventDefault(); route('home'); return; }
  if (mod && e.key.toLowerCase() === '/') { e.preventDefault(); openCommandPalette(); return; }
  if (e.key === 'Escape') {
    const cmd = document.getElementById('cmdPalette'); if (cmd) closeCommandPalette();
    const m = document.getElementById('modal'); if (m && m.classList.contains('active')) closeModal();
  }
});



window.addEventListener('DOMContentLoaded', () => {
  applyTheme(safeGetTheme());
  route('home');
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW register failed:', err));
  }
});
</script>
