<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="PDF44 — Free Online PDF Tools">
  <title>PDF44 — Free Online PDF Tools</title>
  <desc>Open-graph card for PDF44: 41+ free, private, browser-based PDF tools</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0a0a14"/>
      <stop offset="55%"  stop-color="#181a36"/>
      <stop offset="100%" stop-color="#2b1659"/>
    </linearGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#a5b4fc"/>
      <stop offset="55%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#8b5cf6" stop-opacity="0.45"/>
      <stop offset="60%"  stop-color="#6366f1" stop-opacity="0.0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Soft glow -->
  <circle cx="950" cy="180" r="280" fill="url(#glow)"/>
  <circle cx="180" cy="520" r="220" fill="url(#glow)" opacity="0.7"/>

  <!-- Grid pattern -->
  <g opacity="0.07" stroke="#a5b4fc" stroke-width="1">
    <path d="M0 90 H1200 M0 180 H1200 M0 270 H1200 M0 360 H1200 M0 450 H1200 M0 540 H1200"/>
    <path d="M120 0 V630 M240 0 V630 M360 0 V630 M480 0 V630 M600 0 V630 M720 0 V630 M840 0 V630 M960 0 V630 M1080 0 V630"/>
  </g>

  <!-- Logo card -->
  <g transform="translate(96 96)">
    <rect width="170" height="170" rx="38" fill="url(#logo)" filter="url(#soft)" opacity="0.6"/>
    <rect width="170" height="170" rx="38" fill="url(#logo)"/>
    <text x="85" y="128" text-anchor="middle"
          font-family="system-ui, -apple-system, 'Segoe UI', Arial, sans-serif"
          font-size="108" font-weight="900" fill="#ffffff" letter-spacing="-6">P</text>
  </g>

  <!-- Brand wordmark -->
  <text x="296" y="200"
        font-family="system-ui, -apple-system, 'Segoe UI', Arial, sans-serif"
        font-size="84" font-weight="900" fill="#ffffff" letter-spacing="-2">PDF<tspan fill="#a5b4fc">44</tspan></text>
  <text x="298" y="246"
        font-family="system-ui, -apple-system, 'Segoe UI', Arial, sans-serif"
        font-size="22" font-weight="600" fill="#cbd5ff" letter-spacing="3">EVERY PDF TOOL YOU NEED</text>

  <!-- Headline -->
  <text x="96" y="368"
        font-family="system-ui, -apple-system, 'Segoe UI', Arial, sans-serif"
        font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">Free Online PDF Tools</text>
  <text x="96" y="446"
        font-family="system-ui, -apple-system, 'Segoe UI', Arial, sans-serif"
        font-size="44" font-weight="700" fill="#a5b4fc" letter-spacing="-1">No upload · No account · 100% private</text>

  <!-- Feature pills -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700">
    <g transform="translate(96 510)">
      <rect width="190" height="58" rx="29" fill="rgba(99,102,241,0.18)" stroke="rgba(165,180,252,0.55)"/>
      <text x="95" y="38" text-anchor="middle" fill="#ffffff">41+ PDF tools</text>
    </g>
    <g transform="translate(304 510)">
      <rect width="190" height="58" rx="29" fill="rgba(99,102,241,0.18)" stroke="rgba(165,180,252,0.55)"/>
      <text x="95" y="38" text-anchor="middle" fill="#ffffff">In your browser</text>
    </g>
    <g transform="translate(512 510)">
      <rect width="210" height="58" rx="29" fill="rgba(99,102,241,0.18)" stroke="rgba(165,180,252,0.55)"/>
      <text x="105" y="38" text-anchor="middle" fill="#ffffff">Works offline (PWA)</text>
    </g>
    <g transform="translate(740 510)">
      <rect width="170" height="58" rx="29" fill="rgba(34,197,94,0.18)" stroke="rgba(134,239,172,0.6)"/>
      <text x="85" y="38" text-anchor="middle" fill="#bbf7d0">Free forever</text>
    </g>
  </g>

  <!-- Right-side document icon stack -->
  <g transform="translate(900 300)" opacity="0.9">
    <rect x="20" y="20" width="180" height="240" rx="14" fill="#ffffff" opacity="0.08"/>
    <rect x="10" y="10" width="180" height="240" rx="14" fill="#ffffff" opacity="0.14"/>
    <rect x="0"  y="0"  width="180" height="240" rx="14" fill="#ffffff"/>
    <path d="M30 50h120 M30 80h120 M30 110h80 M30 150h120 M30 180h60" stroke="#6366f1" stroke-width="6" stroke-linecap="round"/>
    <text x="90" y="225" text-anchor="middle"
          font-family="system-ui, -apple-system, 'Segoe UI', Arial, sans-serif"
          font-size="18" font-weight="800" fill="#6366f1" letter-spacing="2">PDF</text>
  </g>

  <!-- URL -->
  <text x="1104" y="592" text-anchor="end"
        font-family="system-ui, -apple-system, 'Segoe UI', Arial, sans-serif"
        font-size="22" font-weight="600" fill="#cbd5ff" opacity="0.85">pdf44.com</text>
</svg>
